services:
  postgres:
    image: postgres:16-alpine
    container_name: bootcamp-treinos-api-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pgpassword
      POSTGRES_DB: bootcamp-treinos-db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
